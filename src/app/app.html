<div class="container mt-4">
  <h1 class="mb-4">Lista de productos</h1>

  <div class="mb-4">
    <input
      type="text"
      class="form-control mb-2"
      placeholder="Nombre del producto"
      [(ngModel)]="nuevoNombre"
    />
  </div>
  <div class="form-check mb-2">
    <input
      class="form-check-input"
      type="checkbox"
      [(ngModel)]="nuevoDisponible"
      id="disponibleCheck"
    />
    <!-- id -> identifica al checkbox en el HTML -->
    <label class="form-check-label" for="disponibleCheck"> Disponible </label>
  </div>

  <button class="btn btn-primary me-2 mb-2" (click)="guardarProducto()">
    {{ productoEditandoId === null ? 'Agregar Producto' : 'Actualizar Producto' }}
  </button>

  <button
    class="btn btn-secondary mb-2"
    *ngIf="productoEditandoId !== null"
    (click)="limpiarFormulario()"
  >
    Cancelar edición
  </button>

  <div *ngIf="errorMensaje" class="alert alert-danger">
    {{ errorMensaje }}
  </div>

  <table class="table table-bordered table-striped" *ngIf="productos.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Disponible</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let producto of productos">
        <td>{{ producto.id }}</td>
        <td>{{ producto.nombre }}</td>
        <td>{{ producto.disponible ? 'Sí' : 'No' }}</td>
        <td>
          <button class="btn btn-warning btn-sm me-2" (click)="editarProducto(producto)">
            Editar
          </button>
          <button class="btn btn-danger btn-sm" (click)="eliminarProducto(producto.id)">
            Eliminar
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="productos.length === 0 && !errorMensaje" class="alert alert-warning">
    No hay productos para mostrar.
  </div>
</div>
